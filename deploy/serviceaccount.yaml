# Namespace + ServiceAccount for fab workloads running inside the cluster.
#
# The IRSA annotation binds the ServiceAccount to an AWS IAM role, so pods
# receive short-lived AWS credentials with no static key. That role is a
# standard workload IAM role: a trust policy scoped to this ServiceAccount
# via the cluster's OIDC provider, and a permission policy granting
# `bedrock:InvokeModel` + `bedrock:InvokeModelWithResponseStream` on the
# Claude models in use. Provision it in the cloud-infra layer alongside
# other workload IAM roles, and put its ARN here — that is the credential
# `FAB_INFERENCE=bedrock` authenticates with.
apiVersion: v1
kind: Namespace
metadata:
  name: fab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fab
  namespace: fab
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<FAB_BEDROCK_ROLE>
