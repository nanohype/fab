name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      # The factory enforces build/lint/test/docs as four distinct phases that
      # exit 0 — eat our own dogfood and generate the SDK API docs here too.
      - run: npm run docs

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # PRs validate the build (both arches) but don't publish; pushes to main
      # and tags publish a multi-arch image to GHCR. arm64 is required — the
      # eks-agent-platform spokes run on Graviton, so an amd64-only image
      # CrashLoops with exec-format error on the AgentSandbox pod.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nanohype/fab
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (and push on main / tags)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # Keyless cosign signature + SBOM attestation on the pushed multi-arch
      # image, by digest (immutable, covers the manifest list). Push-only — PRs
      # build but never publish, so there's nothing to sign. Matches the
      # eks-agent-platform operator release so cluster verify-images policies
      # (Kyverno) accept the fab image too.
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3
      - name: Install syft
        if: github.event_name == 'push'
        uses: anchore/sbom-action/download-syft@v0
      - name: Sign + SBOM-attest the image (keyless, by digest)
        if: github.event_name == 'push'
        env:
          IMAGE_DIGEST: ghcr.io/nanohype/fab@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_DIGEST}"
          syft "${IMAGE_DIGEST}" -o spdx-json > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_DIGEST}"
