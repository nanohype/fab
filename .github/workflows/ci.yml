name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      # The factory enforces build/lint/test/docs as four distinct phases that
      # exit 0 — eat our own dogfood and generate the SDK API docs here too.
      - run: npm run docs

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fab:ci .
